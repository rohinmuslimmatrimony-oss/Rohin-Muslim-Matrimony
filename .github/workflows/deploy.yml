name: Deploy to cPanel (rohinmuslimmatrimony.com)

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build & Deploy Frontend (React)
  # ─────────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build React app
        run: npm run build
        working-directory: client
        env:
          VITE_API_URL: https://rohinmuslimmatrimony.com/api

      - name: Create .htaccess for React SPA routing
        run: |
          cat > client/dist/.htaccess << 'EOF'
          <IfModule mod_rewrite.c>
              RewriteEngine On
              RewriteBase /
              RewriteRule ^index\.html$ - [L]
              RewriteCond %{REQUEST_FILENAME} !-f
              RewriteCond %{REQUEST_FILENAME} !-d
              RewriteRule . /index.html [L]
          </IfModule>
          EOF

      - name: Deploy frontend to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: client/dist/
          server-dir: /rohinmuslimmatrimony.com/
          dangerous-clean-slate: false

  # ─────────────────────────────────────────
  # JOB 2: Deploy Backend (Node.js)
  # ─────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest

    steps:
