        uses: actions/checkout@v4

      - name: Create server .env file
        run: |
          cat > server/.env << 'EOF'
          PORT=5000
          MONGO_URI=mongodb+srv://rohinmuslimmatrimony_db_user:rdXYKfglh2chFptr@cluster0.0pnsi3n.mongodb.net/muslim-matrimony?retryWrites=true&w=majority&appName=Cluster0
          JWT_SECRET=muslim_matrimony_mvp_secret_key_2026_halal_love
          NODE_ENV=production
          PAYMENT_GATEWAY_MODE=mock_razorpay
          MOCK_MERCHANT_KEY=mock_rzp_live_xxx123
          MOCK_MERCHANT_SECRET=mock_rzp_secret_xxx123
          EMAIL_HOST=smtp.gmail.com
          EMAIL_PORT=587
          EMAIL_SECURE=false
          EMAIL_USER=webnappstudio@gmail.com
          EMAIL_PASS=ahyyebsdxtiwzdoq
          VAPID_PUBLIC_KEY=BCsipIoyavxdG_xn-wVwitQ3f3hjG-g1IhJ-yHG9EyFSjx7j8qtmHCpE1tXGIZ0TESV4IEMP25zVz5m9xbwKGgE
          VAPID_PRIVATE_KEY=wdAb8oMLtV5Bs3uPgyTjVAqKTHQLPqXwP4Pd81UH2fU
